<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Mario - Fase Completa</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #6b88ff;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #title-screen {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, #0000aa, #000066);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.8s;
    }
    #title-screen h1 {
      font-size: 5rem;
      margin: 0;
      text-shadow: 6px 6px 0 #000;
      color: #ff4444;
    }
    #title-screen p {
      font-size: 2rem;
      margin: 20px;
      text-align: center;
    }
    #title-screen button {
      font-size: 2rem;
      padding: 15px 40px;
      background: #ffdd00;
      border: 6px solid #000;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 8px 0 #aa8800;
    }
    #title-screen button:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #aa8800;
    }
    canvas {
      image-rendering: pixelated;
      width: 100%;
      height: 100%;
      background: #87CEEB;
      display: block;
    }
  </style>
</head>
<body>
<div id="game-container">
  <div id="title-screen">
    <h1>Mini Mario</h1>
    <p>Use ← → A D para andar<br>ESPAÇO ↑ W para pular</p>
    <button id="startBtn">COMEÇAR A AVENTURA</button>
  </div>
  <canvas id="gameCanvas"></canvas>
</div>

<script>
// ================================================
// MINI MARIO - VERSÃO COMPLETA PARA GITHUB PAGES
// ================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let canvasWidth = window.innerWidth;
let canvasHeight = window.innerHeight;
canvas.width = canvasWidth;
canvas.height = canvasHeight;

window.addEventListener('resize', () => {
  canvasWidth = window.innerWidth;
  canvasHeight = window.innerHeight;
  canvas.width = canvasWidth;
  canvas.height = canvasHeight;
  if (gameState !== 'title') initCurrentLevel();
});

// Estados
let gameState = 'title'; // title | playing | gameover | levelcomplete | win
let currentLevel = 0;
let time = 0;
const WORLD_WIDTH = 3600;
const camera = { x: 0 };
let clouds = [];
let flagPoleLowered = false;

// Player
const player = {
  x: 80, y: 0, width: 42, height: 64,
  vx: 0, vy: 0,
  speed: 5, jumpPower: -14.5, gravity: 0.65,
  onGround: false, facingRight: true,
  animTime: 0, animFrame: 0, isWalking: false
};

// Teclas
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Níveis (mantidos iguais)
const levels = [ /* ... cole aqui os dois níveis que você já tem ... */ 
  // Nível 1 e Nível 2 (copie do seu código original)
  // Exemplo resumido:
  { worldWidth: WORLD_WIDTH, flagX: 3550, startX: 80,
    getPlatforms: h => [ /* array de plataformas */ ],
    getEnemies: h => [ /* array de inimigos */ ]
  },
  { /* nível 2 */ }
];

let platforms = [];
let enemies = [];

// Inicializações
function initClouds() {
  clouds = [];
  for (let i = 0; i < 8; i++) {
    clouds.push({
      worldX: Math.random() * WORLD_WIDTH * 1.2,
      y: 80 + Math.random() * 120,
      size: 40 + Math.random() * 60
    });
  }
}

function initCurrentLevel() {
  const h = canvasHeight;
  const level = levels[currentLevel];
  platforms = level.getPlatforms(h);
  enemies = level.getEnemies(h).map(e => ({ ...e, vy: 0, alive: true }));
  player.x = level.startX;
  player.y = platforms[0].y - player.height;
  player.vx = player.vy = 0;
  player.onGround = false;
  player.animTime = player.animFrame = 0;
  player.isWalking = false;
  camera.x = 0;
  flagPoleLowered = false;
}

function nextLevel() {
  if (currentLevel < levels.length - 1) {
    currentLevel++;
    initCurrentLevel();
    gameState = 'playing';
  } else {
    gameState = 'win';
  }
}

// ================================================
// EVENTO DO BOTÃO INICIAR
// ================================================
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('title-screen').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('title-screen').style.display = 'none';
    initClouds();
    initCurrentLevel();
    gameState = 'playing';
  }, 800);
});

// ================================================
// LOOP PRINCIPAL + UPDATES + DRAWS (cole aqui todas as funções que já temos)
// updatePlayer(), updateEnemies(), updateClouds(), updateCamera(),
// checkCollisions(), checkWin(), die(),
// drawEverything(), drawBackground(), drawGround(), drawPlatform(),
// drawMario(), drawGoomba(), drawFlag(), drawUI(), drawGameOver(),
// drawLevelComplete(), drawWin()
// ================================================
// (copie e cole todas as funções de update e draw da nossa conversa anterior aqui)

function gameLoop() {
  time += 1/60;
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);

  if (gameState === 'title') {
    // gerenciado pelo HTML
  } else if (gameState === 'playing') {
    updatePlayer();
    updateEnemies();
    updateClouds();
    updateCamera();
    checkCollisions();
    checkWin();
    drawEverything();
  } else if (gameState === 'gameover') {
    drawEverything();
    drawGameOver();
  } else if (gameState === 'levelcomplete') {
    drawEverything();
    drawLevelComplete();
  } else if (gameState === 'win') {
    drawEverything();
    drawWin();
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();  // Inicia tudo!
</script>
</body>
</html>

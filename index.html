<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo Roxo</title>
    <style>
        /* Definindo o fundo com um degradê roxo profundo */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            color: #2d3748;
            max-width: 350px;
            border: 2px solid #9f7aea; /* Borda roxa clara */
        }

        h1 {
            color: #553c9a; /* Roxo escuro */
            margin-bottom: 15px;
            font-size: 2rem;
        }

        p {
            color: #6b46c1; /* Roxo médio */
            margin-bottom: 25px;
        }

        button {
            background: #805ad5;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(128, 90, 213, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            background: #6b46c1;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(128, 90, 213, 0.6);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="titulo">Olá, Roxo! 💜</h1>
        <p>Este layout foi personalizado com tons de violeta e ametista.</p>
        <button onclick="mudarTexto()">Mudar Mensagem</button>
    </div>

    <script>
        function mudarTexto() {
            const titulo = document.getElementById('titulo');
            titulo.innerText = "Ficou ótimo! ✨";
            titulo.style.color = "#b794f4"; // Roxo bem clarinho ao clicar
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buraco Negro Neon</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #050505; /* Fundo quase breu */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* O Buraco Negro Animado */
        .black-hole {
            position: absolute;
            width: 150px;
            height: 150px;
            background: black;
            border-radius: 50%;
            z-index: -1; /* Fica atrás do texto */
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Sombras que criam o efeito de evento de horizontes */
            box-shadow: 
                0 0 20px #7b2ff7, 
                0 0 50px #3b0764,
                0 0 100px #7b2ff7;
            animation: pulsar 4s infinite ease-in-out, girar 10s linear infinite;
        }

        @keyframes pulsar {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        @keyframes girar {
            from { filter: hue-rotate(0deg); }
            to { filter: hue-rotate(360deg); }
        }

        /* O Card Preto com Neon */
        .card {
            background-color: #000; /* Caixa Preta */
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 400px;
            
            /* Bordas Roxo Neon */
            border: 2px solid #a855f7;
            box-shadow: 0 0 15px #a855f7, inset 0 0 10px #a855f7;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #a855f7; /* Brilho no texto */
        }

        p {
            color: #d8b4fe;
            font-size: 1.1rem;
        }

        button {
            background: transparent;
            color: #fff;
            border: 2px solid #a855f7;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px #a855f7;
            margin-top: 20px;
        }

        button:hover {
            background: #a855f7;
            box-shadow: 0 0 30px #a855f7;
            color: black;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="black-hole"></div> <h1>Olá, Mundo!</h1>
        <p>Bem-vindo ao centro da galáxia neon.</p>
        <button onclick="mudar()">Explorar</button>
    </div>

    <script>
        function mudar() {
            alert("Você entrou na zona gravitacional!");
        }
    </script>

</body>
</html>
